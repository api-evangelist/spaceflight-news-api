aid: spaceflight-news-api
url: https://raw.githubusercontent.com/api-evangelist/spaceflight-news-api/refs/heads/main/apis.yml
name: Spaceflight News API
description: >-
  The Spaceflight News API (SNAPI) is a free, open REST API that aggregates space-related
  news, blogs, and reports from over 43 sources including NASA, SpaceX, Reuters, NASASpaceflight,
  and Spaceflight Now. It provides paginated access to articles, blogs, and reports with
  integration to Launch Library 2 for linking news to specific launches and events.
type: Index
