naftiko: 1.0.0-alpha2
info:
  label: Spaceflight News Monitoring
  description: Workflow capability for monitoring and aggregating spaceflight news, blogs, and mission reports. Useful for
    applications that want to track space industry developments, follow specific launches, or build space news feeds and dashboards.
  tags:
  - News
  - Space
  - Spaceflight
  - Media
  - Monitoring
  created: '2026-05-02'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: snapi
    baseUri: https://api.spaceflightnewsapi.net/v4
    description: Spaceflight News API v4
    resources:
    - name: articles
      path: /articles/
      description: Spaceflight news articles from 43+ sources
      operations:
      - name: list-articles
        method: GET
        description: List spaceflight news articles with optional filtering and search
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Number of results per page
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        - name: search
          in: query
          type: string
          required: false
          description: Filter by title or summary keywords
        - name: news_site
          in: query
          type: string
          required: false
          description: Filter by news site name
        - name: launch
          in: query
          type: string
          required: false
          description: Filter by Launch Library 2 launch UUID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-article
        method: GET
        description: Get a single article by ID
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Article unique identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: blogs
      path: /blogs/
      description: Spaceflight blog posts
      operations:
      - name: list-blogs
        method: GET
        description: List spaceflight blog posts with optional filtering
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Number of results per page
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        - name: search
          in: query
          type: string
          required: false
          description: Filter by title or summary keywords
        - name: news_site
          in: query
          type: string
          required: false
          description: Filter by publishing organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-blog
        method: GET
        description: Get a single blog post by ID
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Blog post unique identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: reports
      path: /reports/
      description: Spaceflight mission reports from agencies and organizations
      operations:
      - name: list-reports
        method: GET
        description: List spaceflight mission reports with optional filtering
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Number of results per page
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        - name: search
          in: query
          type: string
          required: false
          description: Filter by title or summary keywords
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-report
        method: GET
        description: Get a single mission report by ID
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Report unique identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: info
      path: /info/
      description: API metadata including version and news sources
      operations:
      - name: get-info
        method: GET
        description: Get API version and list of supported news sources
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: space-news-api
    description: Unified REST API for spaceflight news monitoring and aggregation.
    resources:
    - path: /v1/articles
      name: articles
      description: Spaceflight news articles aggregated from 43+ sources
      operations:
      - method: GET
        name: list-articles
        description: List the latest spaceflight news articles with optional filtering
        call: snapi.list-articles
        with:
          search: rest.search
          news_site: rest.news_site
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/articles/{id}
      name: article
      description: Single spaceflight news article
      operations:
      - method: GET
        name: get-article
        description: Get a spaceflight news article by ID
        call: snapi.get-article
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/blogs
      name: blogs
      description: Spaceflight blog posts with in-depth coverage
      operations:
      - method: GET
        name: list-blogs
        description: List spaceflight blog posts
        call: snapi.list-blogs
        with:
          search: rest.search
          news_site: rest.news_site
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reports
      name: reports
      description: Formal spaceflight mission reports from agencies
      operations:
      - method: GET
        name: list-reports
        description: List spaceflight mission reports
        call: snapi.list-reports
        with:
          search: rest.search
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/info
      name: info
      description: API metadata and news source list
      operations:
      - method: GET
        name: get-info
        description: Get API version and list of all supported news sources
        call: snapi.get-info
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: space-news-mcp
    transport: http
    description: MCP server for AI-assisted spaceflight news monitoring and research.
    tools:
    - name: list-articles
      description: List the latest spaceflight news articles from 43+ sources; supports filtering by news site or keyword
        search
      hints:
        readOnly: true
        openWorld: true
      call: snapi.list-articles
      with:
        search: tools.search
        news_site: tools.news_site
        limit: tools.limit
        launch: tools.launch
      outputParameters:
      - type: object
        mapping: $.
    - name: get-article
      description: Get a specific spaceflight news article by its ID
      hints:
        readOnly: true
      call: snapi.get-article
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-blogs
      description: List spaceflight blog posts providing in-depth coverage of launches and missions
      hints:
        readOnly: true
        openWorld: true
      call: snapi.list-blogs
      with:
        search: tools.search
        news_site: tools.news_site
      outputParameters:
      - type: object
        mapping: $.
    - name: list-reports
      description: List formal spaceflight mission reports published by space agencies and organizations
      hints:
        readOnly: true
        openWorld: true
      call: snapi.list-reports
      with:
        search: tools.search
      outputParameters:
      - type: object
        mapping: $.
    - name: get-api-info
      description: Get Spaceflight News API version and the complete list of aggregated news sources
      hints:
        readOnly: true
      call: snapi.get-info
      outputParameters:
      - type: object
        mapping: $.
