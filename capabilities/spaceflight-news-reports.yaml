naftiko: 1.0.0-alpha2
info:
  label: Spaceflight News API — Reports
  description: 'Spaceflight News API — Reports. 2 operations. Lead operation: List Reports. Self-contained Naftiko capability
    covering one Spaceflight News Api business surface.'
  tags:
  - Spaceflight News Api
  - Reports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPACEFLIGHT_NEWS_API_API_KEY: SPACEFLIGHT_NEWS_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: spaceflight-news-reports
    baseUri: https://api.spaceflightnewsapi.net/v4
    description: Spaceflight News API — Reports business capability. Self-contained, no shared references.
    resources:
    - name: reports
      path: /reports/
      operations:
      - name: listreports
        method: GET
        description: List Reports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Number of results to return per page (default 10, max 100)
        - name: offset
          in: query
          type: integer
          description: The initial index from which to return the results
        - name: search
          in: query
          type: string
          description: Filter reports by title or summary keywords
        - name: news_site
          in: query
          type: string
          description: Filter reports by news site or agency name
        - name: ordering
          in: query
          type: string
          description: Sort field. Prefix with - for descending order
    - name: reports-id
      path: /reports/{id}/
      operations:
      - name: getreport
        method: GET
        description: Get Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: Unique identifier of the report
          required: true
  exposes:
  - type: rest
    namespace: spaceflight-news-reports-rest
    port: 8080
    description: REST adapter for Spaceflight News API — Reports. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/reports
      name: reports
      description: REST surface for reports.
      operations:
      - method: GET
        name: listreports
        description: List Reports
        call: spaceflight-news-reports.listreports
        with:
          limit: rest.limit
          offset: rest.offset
          search: rest.search
          news_site: rest.news_site
          ordering: rest.ordering
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reports/{id}
      name: reports-id
      description: REST surface for reports-id.
      operations:
      - method: GET
        name: getreport
        description: Get Report
        call: spaceflight-news-reports.getreport
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: spaceflight-news-reports-mcp
    port: 9090
    transport: http
    description: MCP adapter for Spaceflight News API — Reports. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-reports
      description: List Reports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spaceflight-news-reports.listreports
      with:
        limit: tools.limit
        offset: tools.offset
        search: tools.search
        news_site: tools.news_site
        ordering: tools.ordering
      outputParameters:
      - type: object
        mapping: $.
    - name: get-report
      description: Get Report
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spaceflight-news-reports.getreport
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
