naftiko: "1.0.0-alpha1"

info:
  label: Spaceflight News API
  description: >-
    REST API providing access to spaceflight news, blogs, and reports aggregated from
    over 43 sources including NASA, SpaceX, Reuters, NASASpaceflight, and Spaceflight Now.
    No authentication required. Supports pagination, filtering, and search.
  tags:
    - News
    - Space
    - Spaceflight
    - Media
  created: "2026-05-02"
  modified: "2026-05-02"

capability:
  consumes:
    - type: http
      namespace: snapi
      baseUri: https://api.spaceflightnewsapi.net/v4
      description: Spaceflight News API v4
      resources:
        - name: articles
          path: /articles/
          description: Spaceflight news articles from 43+ sources
          operations:
            - name: list-articles
              method: GET
              description: List spaceflight news articles with optional filtering and search
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Number of results per page
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Pagination offset
                - name: search
                  in: query
                  type: string
                  required: false
                  description: Filter by title or summary keywords
                - name: news_site
                  in: query
                  type: string
                  required: false
                  description: Filter by news site name
                - name: launch
                  in: query
                  type: string
                  required: false
                  description: Filter by Launch Library 2 launch UUID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-article
              method: GET
              description: Get a single article by ID
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: Article unique identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: blogs
          path: /blogs/
          description: Spaceflight blog posts
          operations:
            - name: list-blogs
              method: GET
              description: List spaceflight blog posts with optional filtering
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Number of results per page
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Pagination offset
                - name: search
                  in: query
                  type: string
                  required: false
                  description: Filter by title or summary keywords
                - name: news_site
                  in: query
                  type: string
                  required: false
                  description: Filter by publishing organization
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-blog
              method: GET
              description: Get a single blog post by ID
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: Blog post unique identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: reports
          path: /reports/
          description: Spaceflight mission reports from agencies and organizations
          operations:
            - name: list-reports
              method: GET
              description: List spaceflight mission reports with optional filtering
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Number of results per page
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Pagination offset
                - name: search
                  in: query
                  type: string
                  required: false
                  description: Filter by title or summary keywords
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-report
              method: GET
              description: Get a single mission report by ID
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: Report unique identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: info
          path: /info/
          description: API metadata including version and news sources
          operations:
            - name: get-info
              method: GET
              description: Get API version and list of supported news sources
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: snapi-rest
      resources:
        - path: /v1/articles
          name: articles
          description: Spaceflight news articles
          operations:
            - method: GET
              name: list-articles
              description: List spaceflight news articles
              call: "snapi.list-articles"
              with:
                limit: "rest.limit"
                offset: "rest.offset"
                search: "rest.search"
                news_site: "rest.news_site"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/blogs
          name: blogs
          description: Spaceflight blog posts
          operations:
            - method: GET
              name: list-blogs
              description: List spaceflight blog posts
              call: "snapi.list-blogs"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/reports
          name: reports
          description: Spaceflight mission reports
          operations:
            - method: GET
              name: list-reports
              description: List spaceflight mission reports
              call: "snapi.list-reports"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: snapi-mcp
      transport: http
      tools:
        - name: list-articles
          description: List spaceflight news articles from 43+ sources with optional filtering by news site or keyword search
          hints:
            readOnly: true
            openWorld: true
          call: "snapi.list-articles"
          with:
            search: "tools.search"
            news_site: "tools.news_site"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-blogs
          description: List spaceflight blog posts with optional keyword filtering
          hints:
            readOnly: true
            openWorld: true
          call: "snapi.list-blogs"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-reports
          description: List formal spaceflight mission reports from space agencies
          hints:
            readOnly: true
            openWorld: true
          call: "snapi.list-reports"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-api-info
          description: Get Spaceflight News API version and list of all supported news sources
          hints:
            readOnly: true
          call: "snapi.get-info"
          outputParameters:
            - type: object
              mapping: "$."
